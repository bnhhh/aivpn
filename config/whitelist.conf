# whitelist.conf - Rules for Mini AI VPN Gateway whitelist
# Bỏ qua kiểm tra cho các IP, dải mạng CIDR và Tên miền tin cậy dưới đây.
# Định dạng: Mỗi dòng một luật, dòng bắt đầu bằng '#' sẽ được coi là comment.

# 1. Các máy chủ DNS công cộng tin cậy
8.8.8.8 # (DNS của Google)
1.1.1.1 # (DNS của Cloudflare)

# 2. Dải mạng nội bộ an toàn (WireGuard VPN clients và Loopback)
127.0.0.1 # IP chỉ chính nó, phục vụ giao tiếp nội bộ trong Server (Địa chỉ Loopback)
#10.38.50.1
#10.38.50.2
#10.0.0.0/8

# 3. Tên miền tin cậy được phép truy cập không kiểm duyệt
google.com
wikipedia.org
microsoft.com
apple.com
github.com
#(Wildcard Domain)
*.google.com #(ví dụ: gmail.google.com, drive.google.com,...)
*.wikipedia.org
